<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.2" />
    </linearGradient>
  </defs>
  
  <rect width="512" height="512" rx="120" fill="url(#logoGrad)" />
  
  <g transform="translate(106, 116) scale(0.6)">
    <!-- Base isometric box -->
    <path d="M250 50 L450 150 L250 250 L50 150 Z" fill="url(#boxGrad)" />
    <path d="M50 150 L250 250 L250 450 L50 350 Z" fill="#ffffff" opacity="0.6" />
    <path d="M450 150 L250 250 L250 450 L450 350 Z" fill="#ffffff" opacity="0.4" />
    
    <!-- Lid flaps -->
    <path d="M250 50 L350 100 L150 200 L50 150 Z" fill="#ffffff" opacity="0.8" />
    <path d="M250 50 L150 100 L350 200 L450 150 Z" fill="#ffffff" opacity="0.9" />
    
    <!-- Sparkle star -->
    <path d="M350 0 L370 50 L420 70 L370 90 L350 140 L330 90 L280 70 L330 50 Z" fill="#FBBF24" />
  </g>
</svg>