name: Deploy to Vultr

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VULTR_HOST }}
          username: ${{ secrets.VULTR_USERNAME }}
          password: ${{ secrets.VULTR_PASSWORD }}
          port: 22
          script: |
            cd /root/payforme
            git pull origin main
            
            # 安装系统依赖
            apt-get update && apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev libvips-dev
            
            # 清理所有 node_modules 以防 npm 和 pnpm 混用导致的链接丢失
            rm -rf node_modules pnpm-lock.yaml package-lock.json
            
            # 统一使用 npm 安装，避免 pnpm 对原生模块构建的限制
            npm install
            
            # 确保 canvas 和 sharp 被正确编译
            npm rebuild canvas sharp --build-from-source
            
            # 构建前端
            npm run build
            
            # 先杀掉旧进程，再启动，避免旧版本残余导致列缺失报错
            pm2 delete payforme || true
            pm2 start server.ts --name payforme --interpreter ./node_modules/.bin/tsx
            pm2 save
            echo "✅ 部署成功！"