name: Deploy to Vultr

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VULTR_HOST }}
          username: ${{ secrets.VULTR_USERNAME }}
          password: ${{ secrets.VULTR_PASSWORD }}
          port: 22
          script: |
            cd /root/payforme
            git pull origin main
            pnpm install
            # 安装系统依赖并强制使用 npm 安装 canvas 和 sharp
            apt-get update && apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev libvips-dev
            rm -rf node_modules/.pnpm/canvas* node_modules/.pnpm/sharp* node_modules/canvas node_modules/sharp
            npm install canvas sharp --build-from-source
            pnpm build
            # 先杀掉旧进程，再启动，避免旧版本残余导致列缺失报错
            pm2 delete payforme || true
            pm2 start server.ts --name payforme --interpreter ./node_modules/.bin/tsx
            pm2 save
            echo "✅ 部署成功！"